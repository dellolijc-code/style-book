<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Style Book</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #F7F4EF;
  --warm-white: #FDFCFA;
  --dark: #1C1A17;
  --mid: #6B6560;
  --light: #B8B2AB;
  --border: #E5E0D8;
  --accent: #8B6F5E;
  --accent-light: #F0E8E2;
  --new: #4A7C5C;
  --new-light: #EBF4EE;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Jost', sans-serif; background: var(--cream); color: var(--dark); min-height: 100vh; }

/* HEADER */
.header { background: var(--dark); padding: 20px 20px 16px; position: sticky; top: 0; z-index: 50; }
.header-top { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 4px; }
.logo { font-family: 'Cormorant Garamond', serif; font-size: 24px; font-weight: 300; color: var(--cream); letter-spacing: 3px; font-style: italic; }
.look-count { font-size: 11px; color: var(--light); letter-spacing: 1px; }
.save-toast { font-size: 10px; color: var(--new); background: var(--new-light); padding: 2px 8px; border-radius: 20px; opacity: 0; transition: opacity 0.3s; }
.save-toast.show { opacity: 1; }

/* TABS */
.tabs { display: flex; background: var(--warm-white); border-bottom: 1px solid var(--border); }
.tab { flex: 1; padding: 12px; font-size: 12px; letter-spacing: 1.5px; text-align: center; cursor: pointer; color: var(--light); border-bottom: 2px solid transparent; transition: all 0.2s; text-transform: uppercase; font-weight: 500; }
.tab.active { color: var(--dark); border-bottom-color: var(--dark); }

/* SECTION */
.section { padding: 16px 16px 100px; display: none; }
.section.active { display: block; }

/* SEARCH */
.search-wrap { position: relative; margin-bottom: 14px; }
.search-wrap svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); opacity: 0.4; }
.search { width: 100%; padding: 10px 12px 10px 36px; border: 1px solid var(--border); border-radius: 8px; font-size: 13px; background: var(--warm-white); color: var(--dark); font-family: 'Jost', sans-serif; outline: none; }
.search:focus { border-color: var(--accent); }

/* TAGS */
.tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
.tag { padding: 5px 14px; border-radius: 20px; font-size: 11px; cursor: pointer; border: 1px solid var(--border); background: var(--warm-white); color: var(--mid); letter-spacing: 0.5px; transition: all 0.15s; }
.tag.active { background: var(--dark); color: var(--cream); border-color: var(--dark); }

/* COUNT */
.count { font-size: 11px; color: var(--light); margin-bottom: 12px; letter-spacing: 0.5px; }

/* LOOKS GRID */
.looks-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.look-card { background: var(--warm-white); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; cursor: pointer; transition: border-color 0.2s, box-shadow 0.2s; }
.look-card:active { transform: scale(0.98); }
.look-card.open { border-color: var(--accent); box-shadow: 0 2px 12px rgba(139,111,94,0.15); }
.palette { display: flex; height: 6px; }
.look-body { padding: 10px 10px 8px; }
.look-meta { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
.look-num { font-size: 10px; color: var(--light); letter-spacing: 1px; }
.new-badge { font-size: 9px; background: var(--new-light); color: var(--new); padding: 1px 6px; border-radius: 20px; letter-spacing: 0.5px; }
.look-name { font-family: 'Cormorant Garamond', serif; font-size: 15px; font-weight: 400; color: var(--dark); margin-bottom: 6px; line-height: 1.3; }
.occ-badge { display: inline-block; background: var(--accent-light); color: var(--accent); font-size: 10px; padding: 2px 8px; border-radius: 20px; letter-spacing: 0.5px; margin-bottom: 4px; }
.toggle-hint { font-size: 10px; color: var(--light); text-align: center; margin-top: 6px; }

/* PIECES LIST (inside look) */
.pieces-expanded { border-top: 1px solid var(--border); margin-top: 8px; padding-top: 8px; }
.piece-row { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
.piece-thumb { width: 42px; height: 42px; border-radius: 8px; object-fit: cover; border: 1px solid var(--border); flex-shrink: 0; }
.piece-add-btn { width: 42px; height: 42px; border-radius: 8px; border: 1px dashed var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 18px; color: var(--light); cursor: pointer; background: var(--cream); transition: border-color 0.2s; }
.piece-add-btn:active { background: var(--accent-light); }
.piece-row-info { flex: 1; min-width: 0; }
.piece-row-name { font-size: 11px; color: var(--dark); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.piece-row-cat { font-size: 10px; color: var(--light); margin-top: 1px; }

/* PIECES GRID */
.pieces-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.piece-card { background: var(--warm-white); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; cursor: pointer; transition: border-color 0.2s; }
.piece-img-area { width: 100%; aspect-ratio: 1; background: var(--cream); display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; overflow: hidden; cursor: pointer; }
.piece-img-area img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
.piece-placeholder { text-align: center; padding: 20px 12px; z-index: 1; }
.piece-placeholder-icon { font-size: 28px; margin-bottom: 6px; opacity: 0.3; }
.piece-placeholder-txt { font-size: 10px; color: var(--light); line-height: 1.5; }
.piece-change { position: absolute; bottom: 6px; right: 6px; background: rgba(255,255,255,0.9); border: 1px solid var(--border); border-radius: 6px; font-size: 9px; padding: 3px 7px; color: var(--mid); z-index: 2; cursor: pointer; letter-spacing: 0.5px; }
.piece-card-info { padding: 8px 10px 10px; }
.piece-card-name { font-size: 11px; font-weight: 500; color: var(--dark); margin-bottom: 2px; line-height: 1.4; }
.piece-card-cat { font-size: 10px; color: var(--light); }

/* ADD PIECE BTN */
.add-btn { width: 100%; padding: 14px; border: 1px dashed var(--border); border-radius: 12px; background: var(--warm-white); color: var(--mid); font-size: 13px; cursor: pointer; margin-top: 6px; text-align: center; font-family: 'Jost', sans-serif; letter-spacing: 0.5px; transition: all 0.2s; }
.add-btn:active { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }

/* MODAL */
.modal-overlay { position: fixed; inset: 0; background: rgba(28,26,23,0.6); z-index: 200; display: none; align-items: flex-end; justify-content: center; padding: 0; }
.modal-overlay.open { display: flex; }
.modal { background: var(--warm-white); border-radius: 20px 20px 0 0; padding: 24px 20px 40px; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; }
.modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 20px; }
.modal-title { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 400; color: var(--dark); margin-bottom: 16px; }
.modal-img { width: 100%; aspect-ratio: 4/3; background: var(--cream); border: 1px dashed var(--border); border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; margin-bottom: 14px; position: relative; overflow: hidden; }
.modal-img img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
.modal-img-label { font-size: 12px; color: var(--light); margin-top: 8px; }
.modal input[type=text], .modal select { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; background: var(--warm-white); color: var(--dark); font-family: 'Jost', sans-serif; outline: none; margin-bottom: 10px; }
.modal input[type=text]:focus, .modal select:focus { border-color: var(--accent); }
.modal-btns { display: flex; gap: 8px; margin-top: 6px; }
.btn { flex: 1; padding: 12px; border-radius: 8px; font-size: 13px; cursor: pointer; border: 1px solid var(--border); font-family: 'Jost', sans-serif; letter-spacing: 0.5px; transition: all 0.15s; }
.btn-primary { background: var(--dark); color: var(--cream); border-color: var(--dark); }
.btn-secondary { background: var(--warm-white); color: var(--mid); }

/* SUGGESTIONS */
.sug-section { margin-top: 14px; }
.sug-label { font-size: 11px; color: var(--light); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }
.sug-look { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); }
.sug-look:last-child { border-bottom: none; }
.sug-pal { width: 28px; height: 28px; border-radius: 6px; overflow: hidden; display: flex; flex-shrink: 0; }
.sug-info { flex: 1; min-width: 0; }
.sug-name { font-size: 11px; font-weight: 500; color: var(--dark); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sug-occ { font-size: 10px; color: var(--light); }
.sug-pct { font-size: 10px; color: var(--accent); background: var(--accent-light); padding: 2px 7px; border-radius: 20px; flex-shrink: 0; }
.sug-box { background: var(--cream); border-radius: 10px; padding: 10px 12px; margin-bottom: 10px; border: 1px solid var(--border); }
</style>
</head>

</div>

// ── STATE ─────────────────────────────────────────────────────────────────
let pieces=[...basePieces];
let looks=[...baseLoooks];
let photos={};
let openLook=null;
let activeOcc="Todos";
let activeCat="Todos";
let currentTab="looks";
let uploadTarget=null;
let modalImg=null;
let nextPieceId=59;
let nextLookId=104;

const occs=["Todos","Praia","Festa","Jantar","Trabalho","Passeio","Encontro","Café","Casual","Evento","Almoço","Viagem","Urbano","Bar","Resort"];
const cats=["Todos","Vestidos","Tops","Saias","Calças","Conjuntos","Calçados","Joias","Bolsas","Acessórios","Praia"];

// ── STORAGE ───────────────────────────────────────────────────────────────
function save(){
  try{
    localStorage.setItem('sb_photos', JSON.stringify(photos));
    const extra={pieces:pieces.filter(p=>p.id>=59),looks:looks.filter(l=>l.id>=104)};
    localStorage.setItem('sb_extra', JSON.stringify(extra));
    showToast();
  }catch(e){console.warn('Storage full',e);}
}

function load(){
  try{
    const p=localStorage.getItem('sb_photos');
    if(p) photos=JSON.parse(p);
    const e=localStorage.getItem('sb_extra');
    if(e){
      const ex=JSON.parse(e);
      if(ex.pieces) pieces=[...basePieces,...ex.pieces];
      if(ex.looks){ex.looks.forEach(l=>{if(!looks.find(x=>x.id===l.id))looks.push(l);});}
      if(pieces.length) nextPieceId=Math.max(...pieces.map(p=>p.id))+1;
      if(looks.length) nextLookId=Math.max(...looks.map(l=>l.id))+1;
    }
  }catch(e){}
  renderLooks();
  document.getElementById('header-count').textContent=`${looks.length} looks · ${pieces.length} peças`;
}

function showToast(){
  const t=document.getElementById('toast');
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),1800);
}

// ── HELPERS ───────────────────────────────────────────────────────────────
function getP(id){return pieces.find(p=>p.id===id);}

function scorePiece(newP,look){
  let s=0;
  const compat=colorCompat[newP.color]||[];
  look.pieces.forEach(pid=>{
    const p=getP(pid);if(!p)return;
    if(compat.includes(p.color)||p.color===newP.color)s+=2;
    if(p.cat!==newP.cat)s+=1;
  });
  const goodOccs=catOccMap[newP.cat]||[];
  if(goodOccs.includes("Todos")||goodOccs.includes(look.occ))s+=3;
  const same=look.pieces.filter(pid=>{const p=getP(pid);return p&&p.cat===newP.cat;});
  if(same.length>0)s-=3;
  return s;
}

function getSuggestedLooks(newP){
  return looks.map(l=>({look:l,score:scorePiece(newP,l)})).filter(x=>x.score>=4).sort((a,b)=>b.score-a.score).slice(0,5);
}

function generateAutoLooks(newP){
  const newL=[];
  const compat=colorCompat[newP.color]||[];
  const goodOccs=(catOccMap[newP.cat]||[]).filter(o=>o!=="Todos");
  const shoes=pieces.filter(p=>p.cat==="Calçados"&&(compat.includes(p.color)||p.color===newP.color));
  const joias=pieces.filter(p=>p.cat==="Joias");
  const tops=pieces.filter(p=>p.cat==="Tops"&&(compat.includes(p.color)||p.color===newP.color));
  const bottoms=pieces.filter(p=>["Saias","Calças"].includes(p.cat)&&(compat.includes(p.color)||p.color===newP.color));
  const isMain=["Vestidos","Conjuntos","Praia"].includes(newP.cat);
  const isTop=newP.cat==="Tops";
  const isBottom=["Saias","Calças"].includes(newP.cat);
  if(["Calçados","Joias","Bolsas","Acessórios"].includes(newP.cat))return[];
  goodOccs.slice(0,3).forEach((occ,i)=>{
    let lp=[newP.id];
    if(isMain){if(shoes[i%Math.max(shoes.length,1)])lp.push(shoes[i%Math.max(shoes.length,1)].id);if(joias[i%joias.length])lp.push(joias[i%joias.length].id);}
    else if(isTop){if(bottoms[i%Math.max(bottoms.length,1)])lp.push(bottoms[i%Math.max(bottoms.length,1)].id);if(shoes[i%Math.max(shoes.length,1)])lp.push(shoes[i%Math.max(shoes.length,1)].id);if(joias[i%joias.length])lp.push(joias[i%joias.length].id);}
    else if(isBottom){if(tops[i%Math.max(tops.length,1)])lp.push(tops[i%Math.max(tops.length,1)].id);if(shoes[i%Math.max(shoes.length,1)])lp.push(shoes[i%Math.max(shoes.length,1)].id);if(joias[i%joias.length])lp.push(joias[i%joias.length].id);}
    lp=[...new Set(lp)].filter(id=>getP(id));
    if(lp.length>=2)newL.push({id:nextLookId+i,name:`${newP.name.split(' ').slice(0,3).join(' ')} — ${occ}`,occ,pieces:lp,isNew:true});
  });
  return newL;
}

// ── RENDER ────────────────────────────────────────────────────────────────
function showTab(t){
  currentTab=t;
  document.getElementById('sec-looks').className='section'+(t==='looks'?' active':'');
  document.getElementById('sec-pieces').className='section'+(t==='pieces'?' active':'');
  document.getElementById('tab-looks').className='tab'+(t==='looks'?' active':'');
  document.getElementById('tab-pieces').className='tab'+(t==='pieces'?' active':'');
  if(t==='pieces')renderPieces();
}

function renderOccTags(){
  document.getElementById('occ-tags').innerHTML=occs.map(o=>`<span class="tag${activeOcc===o?' active':''}" onclick="setOcc('${o}')">${o}</span>`).join('');
}
function setOcc(o){activeOcc=o;renderLooks();}
function setCat(c){activeCat=c;renderPieces();}

function renderLooks(){
  renderOccTags();
  const q=document.getElementById('search').value.toLowerCase();
  const filtered=looks.filter(l=>{
    const mO=activeOcc==="Todos"||l.occ===activeOcc;
    const mQ=!q||l.name.toLowerCase().includes(q)||l.pieces.some(pid=>{const p=getP(pid);return p&&p.name.toLowerCase().includes(q);});
    return mO&&mQ;
  });
  document.getElementById('looks-count').textContent=filtered.length+' looks';
  document.getElementById('looks-grid').innerHTML=filtered.map(l=>{
    const isOpen=openLook===l.id;
    const pal=l.pieces.map(pid=>{const p=getP(pid);return`<div style="flex:1;background:${colorMap[p?.color]||'#aaa'}"></div>`;}).join('');
    let exp='';
    if(isOpen){
      exp=`<div class="pieces-expanded">${l.pieces.map(pid=>{
        const p=getP(pid);const img=photos[pid];
        const th=img?`<img class="piece-thumb" src="${img}">`:`<div class="piece-add-btn" onclick="event.stopPropagation();triggerUp(${pid})">+</div>`;
        return`<div class="piece-row">${th}<div class="piece-row-info"><div class="piece-row-name">${p?.name||''}</div><div class="piece-row-cat">${p?.cat||''}</div></div></div>`;
      }).join('')}</div>`;
    }
    return`<div class="look-card${isOpen?' open':''}" onclick="toggleLook(${l.id})">
      <div class="palette">${pal}</div>
      <div class="look-body">
        <div class="look-meta"><span class="look-num">#${l.id}</span>${l.isNew?'<span class="new-badge">novo</span>':''}</div>
        <div class="look-name">${l.name}</div>
        <span class="occ-badge">${l.occ}</span>
        ${exp}
        <div class="toggle-hint">${isOpen?'▲':'▼'}</div>
      </div>
    </div>`;
  }).join('');
}

function toggleLook(id){openLook=openLook===id?null:id;renderLooks();}

function renderCatTags(){
  document.getElementById('cat-tags').innerHTML=cats.map(c=>`<span class="tag${activeCat===c?' active':''}" onclick="setCat('${c}')">${c}</span>`).join('');
}

function renderPieces(){
  renderCatTags();
  const filtered=activeCat==="Todos"?pieces:pieces.filter(p=>p.cat===activeCat);
  document.getElementById('pieces-grid').innerHTML=filtered.map(p=>{
    const img=photos[p.id];
    return`<div class="piece-card">
      <div class="piece-img-area" onclick="triggerUp(${p.id})">
        ${img?`<img src="${img}" alt="">`:`<div class="piece-placeholder"><div class="piece-placeholder-icon">+</div><div class="piece-placeholder-txt">Toque para adicionar foto</div></div>`}
        ${img?`<span class="piece-change" onclick="event.stopPropagation();triggerUp(${p.id})">trocar</span>`:''}
      </div>
      <div class="piece-card-info">
        <div class="piece-card-name">${p.name}${p.isNew?` <span class="new-badge">novo</span>`:''}</div>
        <div class="piece-card-cat">${p.cat}</div>
      </div>
    </div>`;
  }).join('');
}

// ── UPLOAD ────────────────────────────────────────────────────────────────
function triggerUp(id){uploadTarget=id;document.getElementById('file-input').click();}
document.getElementById('file-input').addEventListener('change',function(){
  if(!this.files[0]||!uploadTarget)return;
  const reader=new FileReader();
  reader.onload=e=>{
    photos[uploadTarget]=e.target.result;
    uploadTarget=null;this.value='';
    save();
    if(currentTab==='pieces')renderPieces();else renderLooks();
  };
  reader.readAsDataURL(this.files[0]);
});

// ── MODAL ─────────────────────────────────────────────────────────────────
function openModal(){
  modalImg=null;
  document.getElementById('mname').value='';
  document.getElementById('mcat').value='';
  document.getElementById('modal-sugs').innerHTML='';
  document.getElementById('modal-img').innerHTML=`<div class="piece-placeholder-icon">📷</div><div class="modal-img-label">Toque para adicionar foto</div><input type="file" id="mfile" accept="image/*" style="display:none" onchange="previewImg(this)">`;
  document.getElementById('modal').classList.add('open');
  setTimeout(()=>{
    document.getElementById('mname').oninput=updateSugs;
    document.getElementById('mcat').onchange=updateSugs;
  },50);
}
function closeModal(){document.getElementById('modal').classList.remove('open');}

function previewImg(input){
  if(!input.files[0])return;
  const r=new FileReader();
  r.onload=e=>{
    modalImg=e.target.result;
    document.getElementById('modal-img').innerHTML=`<img src="${modalImg}"><input type="file" id="mfile" accept="image/*" style="display:none" onchange="previewImg(this)"><span class="piece-change" onclick="event.stopPropagation();document.getElementById('mfile').click()">trocar</span>`;
  };
  r.readAsDataURL(input.files[0]);
}

function updateSugs(){
  const name=document.getElementById('mname').value.trim();
  const cat=document.getElementById('mcat').value;
  if(!name||!cat){document.getElementById('modal-sugs').innerHTML='';return;}
  const tempP={id:nextPieceId,name,cat,color:"neutro"};
  const sugs=getSuggestedLooks(tempP);
  const autoL=generateAutoLooks(tempP);
  let html='';
  if(sugs.length){
    html+=`<div class="sug-section"><div class="sug-label">Adicionar a looks existentes</div><div class="sug-box">`;
    sugs.forEach(({look,score})=>{
      const pal=look.pieces.map(pid=>{const p=getP(pid);return`<div style="flex:1;background:${colorMap[p?.color]||'#aaa'}"></div>`;}).join('');
      const pct=Math.min(100,Math.round((score/10)*100));
      html+=`<div class="sug-look"><div class="sug-pal">${pal}</div><div class="sug-info"><div class="sug-name">#${look.id} ${look.name}</div><div class="sug-occ">${look.occ}</div></div><span class="sug-pct">${pct}%</span></div>`;
    });
    html+=`</div></div>`;
  }
  if(autoL.length){
    html+=`<div class="sug-section"><div class="sug-label">Novos looks gerados</div><div class="sug-box">`;
    autoL.forEach(l=>{
      const pal=l.pieces.map(pid=>{const p=getP(pid);return`<div style="flex:1;background:${colorMap[p?.color]||'#aaa'}"></div>`;}).join('');
      html+=`<div class="sug-look"><div class="sug-pal">${pal}</div><div class="sug-info"><div class="sug-name">${l.name}</div><div class="sug-occ">${l.occ}</div></div><span class="sug-pct">novo</span></div>`;
    });
    html+=`</div></div>`;
  }
  document.getElementById('modal-sugs').innerHTML=html;
}

function confirmAdd(){
  const name=document.getElementById('mname').value.trim();
  const cat=document.getElementById('mcat').value;
  if(!name||!cat){alert('Preencha nome e categoria.');return;}
  const newP={id:nextPieceId,name,cat,color:"neutro",isNew:true};
  pieces.push(newP);
  if(modalImg)photos[nextPieceId]=modalImg;
  const autoL=generateAutoLooks(newP);
  autoL.forEach(l=>{looks.push(l);nextLookId++;});
  nextPieceId++;
  save();
  document.getElementById('header-count').textContent=`${looks.length} looks · ${pieces.length} peças`;
  closeModal();
  if(autoL.length){showTab('looks');activeOcc="Todos";renderLooks();}
  else{renderPieces();}
}

// ── INIT ──────────────────────────────────────────────────────────────────
load();
